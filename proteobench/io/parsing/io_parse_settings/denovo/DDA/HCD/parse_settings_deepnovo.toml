[mapper]
"scan" = "spectrum_id"
"output_seq" = "sequence"
"output_score" = "score"
"aa_score" = "aa_scores"

[spectrum_id_mapper]

[sequence_mapper]
[sequence_mapper.replacement_dict]
"Cmod" = "C(+57.02)"
"Mmod" = "M(+15.99)"
"Nmod" = "N(+.98)"
"Qmod" = "Q(+.98)"
"," = ""

[modifications_parser]
"parse_column" = "sequence"
"before_aa" = false
"isalpha" = true
"isupper" = true
"pattern" = "\\(([^)]+)\\)"
"modification_dict" = {"(+57.02)" = "UNIMOD:4", "(+15.99)" = "UNIMOD:35", "(+.98)" = "UNIMOD:7"}

[upload_info]
"datapoint_file" = "*.tab"
"datapoint_file_description" = "Upload the DeepNovo de novo sequencing output tab file."
"params_file" = ""
"params_file_description" = ""
