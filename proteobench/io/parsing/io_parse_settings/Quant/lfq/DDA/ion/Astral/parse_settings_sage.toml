[mapper]
"proteins" = "Proteins"
"peptide" = "Sequence"
"charge" = "Charge"

[modifications_parser]
"parse_column" = "Sequence"
"before_aa" = false
"isalpha" = true
"isupper" = true
"pattern"="(?<=\\[).+?(?=\\])"
"modification_dict" = {"+57.0215" = "Carbamidomethyl", "+15.9949" = "Oxidation", "-17.026548" = "Gln->pyro-Glu", "-18.010565" = "Glu->pyro-Glu", "+42" = "Acetyl"}

[general]
"contaminant_flag" = "Cont_"
"decoy_flag" = false

[upload_info]
"datapoint_file" = "*.sage.tsv"
"datapoint_file_description" = "Upload the Sage LFQ output TSV file (e.g., `results.sage.tsv`)."
"params_file" = "*.json"
"params_file_description" = "Upload the Sage results JSON file (`results.json`) or a Sage parameter JSON file."
