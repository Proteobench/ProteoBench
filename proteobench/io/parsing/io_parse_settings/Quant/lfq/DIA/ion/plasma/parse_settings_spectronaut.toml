[mapper]
"FG.LabeledSequence" = "Sequence"
"R.FileName" = "Raw file"
"FG.Charge" = "Charge"
"FG.Quantity" = "Intensity"
"PG.ProteinGroups" = "Proteins"

[modifications_parser]
parse_column = "Sequence"
before_aa = false
isalpha = true
isupper = true
pattern = "\\[(.*?)\\]"

[general]
contaminant_flag = "Cont_"
decoy_flag = true

[modifications_parser.modification_dict]
"[oxidation (m)]" = "Oxidation"
"[acetyl (protein n-term)]" = "Acetyl"
"[carbamidomethyl (c)]" = "Carbamidomethyl"

[upload_info]
"datapoint_file" = "*.tsv"
"datapoint_file_description" = "Upload the Spectronaut report TSV file exported from the Spectronaut analysis."
"params_file" = "ExperimentSetupOverview.txt"
"params_file_description" = "Upload the Spectronaut ExperimentSetupOverview export file (`.txt`), available via Export > ExperimentSetupOverview in Spectronaut."
