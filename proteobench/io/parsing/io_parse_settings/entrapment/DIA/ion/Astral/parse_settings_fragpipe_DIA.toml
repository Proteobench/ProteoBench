[mapper]
"Modified Sequence" = "Sequence"
"Protein" = "Protein Group"
"Charge" = "Charge"
"Peptide Sequence" = "Peptide"
"Qvalue" = "Q-Value"
"Expectation" = "Expectation"

[modifications_parser]
"parse_column" = "Sequence"
"before_aa" = false
"isalpha" = true
"isupper" = true
"pattern" = "\\(([^()]*)\\)"
"modification_dict" = {"(unimod:35)" = "Oxidation", "(unimod:1)" = "Acetyl", "(unimod:4)" = "Carbamidomethyl"}

[general]
"decoy_flag" = true

[run_mapper]

[upload_info]
"datapoint_file" = "ion.tsv"
"datapoint_file_description" = "Upload the FragPipe `ion.tsv` file from the search output folder."
"params_file" = "fragpipe.workflow"
"params_file_description" = "Upload the FragPipe workflow file (`.workflow`)."