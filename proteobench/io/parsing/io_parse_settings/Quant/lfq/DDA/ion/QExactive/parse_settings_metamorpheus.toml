[mapper]
"Base Sequence" = "Sequence"
"File Name" = "Raw file"
"Full Sequence" = "Modified sequence"
"Precursor Charge" = "Charge"
"Peak intensity" = "Intensity"

[modifications_parser]
parse_column = "Modified sequence"
before_aa = false
isalpha = true
isupper = true
pattern = "\\[(.*?)\\]"

[general]
contaminant_flag = "Cont_"
decoy_flag = true

[modifications_parser.modification_dict]
"[common fixed:carbamidomethyl on c]" = "Carbamidomethyl"
"[common variable:oxidation on m]" = "Oxidation"
"[common biological:acetylation on x]" = "Acetyl"

[upload_info]
"datapoint_file" = "AllQuantifiedPeaks.tsv"
"datapoint_file_description" = "Upload the MetaMorpheus `AllQuantifiedPeaks.tsv` file from the task output folder."
"params_file" = "search_task_config.toml + version_result.txt"
"params_file_description" = "Upload the MetaMorpheus search task TOML file and the version text file (two files are required)."
